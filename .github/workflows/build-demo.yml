name: build-demo

on:
  push:
    branches: [demo]
  workflow_dispatch:

concurrency:
  group: deploy-demo
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - id: image
        run: |
          tag=$(printf 'ghcr.io/%s/%s' '${{ github.repository_owner }}' '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox
          push: true
          tags: |
            ${{ steps.image.outputs.tag }}:demo
            ${{ steps.image.outputs.tag }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            compose.prod.yml
            compose.royer.yml
            .env.example
          sparse-checkout-cone-mode: false

      - name: POST to deploy webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          PROJECT="${GITHUB_REPOSITORY##*/}"
          case "$PROJECT" in
            CacheWorld) PROJECT=cache-world ;;
            pathology) PROJECT=histoquery ;;
            NexTech) PROJECT=nextech ;;
            shycefx.net) PROJECT=shyce ;;
            VaultsOfArcana-Platform) PROJECT=vaults-of-arcana ;;
          esac
          IMAGE_TAG="${GITHUB_SHA::12}"

          compose_prod_b64=$(base64 -w0 compose.prod.yml)
          compose_royer_b64=""
          [ -f compose.royer.yml ] && compose_royer_b64=$(base64 -w0 compose.royer.yml)
          env_b64=""
          [ -f .env.example ] && env_b64=$(base64 -w0 .env.example)

          payload=$(jq -nc \
            --arg project "$PROJECT" \
            --arg sha "$GITHUB_SHA" \
            --arg tag "$IMAGE_TAG" \
            --arg cp "$compose_prod_b64" \
            --arg cr "$compose_royer_b64" \
            --arg env "$env_b64" \
            '{project: $project, sha: $sha, image_tag: $tag, compose_prod_b64: $cp, compose_royer_b64: $cr, env_b64: $env}')
          sig=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | awk '{print $NF}')

          for i in 1 2; do
            http=$(curl -sS -o /tmp/resp -w '%{http_code}' \
              -X POST \
              -H "Content-Type: application/json" \
              -H "X-Hub-Signature-256: sha256=$sig" \
              --data "$payload" \
              https://deploy.royer.app/hooks/deploy-project) && break
            sleep 5
          done
          echo "webhook http=$http"
          cat /tmp/resp; echo
          [ "$http" = "200" ] || [ "$http" = "202" ]
